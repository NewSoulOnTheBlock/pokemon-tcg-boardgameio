# Render blueprint for the Pokemon TCG multiplayer app.
#
# Apply via Render dashboard: New → Blueprint → point at the repo → Apply.
# Render provisions one Node web service + one free Postgres DB, runs the
# build, and starts the server. The Koa server serves both the static
# Vite build (dist/) and the boardgame.io API + custom /api/* endpoints
# from the same port, so no static-site service is required.

services:
  - type: web
    name: pokemon-tcg-boardgameio
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      # Cap V8 heap below Render's 512 MB starter limit so Node GCs aggressively
      # instead of being OOM-killed by the container. Bump to ~1800 if you
      # upgrade to the Standard plan (2 GB RAM).
      - key: NODE_OPTIONS
        value: --max-old-space-size=420
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon-tcg-db
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: ALLOW_ORIGIN
        sync: false
      - key: BGIO_STORAGE_DIR
        value: /tmp/bgio-storage
      # Phygitals Partner API key (https://dev.phygitals.com). Production
      # key from partners@phygitals.com — required for the Boosters page
      # storefront (browse, buy, sellback).
      #
      # NOTE: VITE_PHYGITALS_API_KEY is a Vite client-side env var — it
      # ends up in the browser bundle and is visible to anyone with
      # DevTools. The server can't proxy these calls because Phygitals'
      # Cloudflare WAF blocks Render's outbound IPs at the edge.
      # Only use a key scoped to vm.buy.crypto + marketplace.take-claw-bid
      # (NEVER an admin/treasury key).
      - key: VITE_PHYGITALS_API_KEY
        sync: false
      # Defaults to https://api.phygitals.com (production).
      - key: VITE_PHYGITALS_BASE_URL
        value: https://api.phygitals.com
      # Optional: override the Solana RPC the client uses to read the
      # token accounts when building the buy tx. Helius/Alchemy recommended
      # for higher rate limits.
      - key: VITE_SOLANA_RPC_URL
        sync: false

databases:
  - name: pokemon-tcg-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
