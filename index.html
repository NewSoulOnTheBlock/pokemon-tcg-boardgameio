<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/site-logo.png" />
    <link rel="apple-touch-icon" href="/site-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Masters</title>
    <style>
      body {
        background: #050810;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
      }
      .boot-splash {
        align-items: center;
        background:
          radial-gradient(ellipse at center, rgba(251, 191, 36, 0.16), transparent 60%),
          #050810;
        display: flex;
        flex-direction: column;
        gap: 18px;
        justify-content: center;
        min-height: 100vh;
        padding: 32px;
        text-align: center;
      }
      .boot-splash img { filter: drop-shadow(0 0 24px rgba(251, 191, 36, 0.45)); max-width: 220px; width: 60vw; }
      .boot-splash h1 {
        background: linear-gradient(120deg, #fef3c7, #fbbf24 50%, #e879f9);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        font-size: 1.6rem; letter-spacing: 0.04em; margin: 0;
      }
      .boot-splash p { color: #cbd5e1; font-weight: 600; margin: 0; min-height: 1.2em; }
      .boot-spinner {
        animation: boot-spin 900ms linear infinite;
        border: 3px solid rgba(251, 191, 36, 0.18);
        border-radius: 50%;
        border-top-color: #fbbf24;
        height: 32px; width: 32px;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      .boot-fatal {
        align-items: center; background: #050810; color: #f8fafc;
        display: flex; flex-direction: column; gap: 14px;
        justify-content: center; min-height: 100vh; padding: 32px; text-align: center;
      }
      .boot-fatal h1 { color: #fb7185; margin: 0; }
      .boot-fatal p { color: #cbd5e1; max-width: 540px; }
      .boot-fatal button {
        background: linear-gradient(135deg, #fbbf24, #f97316);
        border: 0; border-radius: 10px; color: #1a0f00;
        cursor: pointer; font-weight: 900; padding: 10px 18px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <img src="/site-logo.png" alt="Pokemon Masters" />
        <h1>Pokemon TCG Arena</h1>
        <div class="boot-spinner" aria-hidden="true"></div>
        <p id="boot-status">Waking the server…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
